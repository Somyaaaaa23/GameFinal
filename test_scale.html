<!DOCTYPE html>
<html>
<head>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #ccc; }
  .box { width: 100%; height: 100%; border: 5px solid red; box-sizing: border-box; }
  
  @media screen and (max-height: 500px) {
    html, body {
      overflow: hidden;
    }
    #root {
      transform-origin: top left;
      transform: scale(calc(100vh / 750));
      width: calc(100vw / (100vh / 750));
      height: 750px;
    }
  }
</style>
</head>
<body>
  <div id="root">
    <div class="box">
      <h1>Top Left</h1>
      <h1 style="position:absolute; bottom:0; right:0; margin:0;">Bottom Right</h1>
    </div>
  </div>
</body>
</html>
